<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <title>CASIO</title>
  <!--
    Compatibilidad: iPad 2 (A5) · iOS 9.3.5 · Safari 9
    - Sin CSS custom properties (var())
    - Flexbox con prefijos -webkit-
    - Sin fetch(), usa XMLHttpRequest
    - Orbitron via Google Fonts (compatible Safari 9)
    - JS ES5 puro
  -->
  <link href="https://fonts.googleapis.com/css?family=Orbitron:400,700,900|Share+Tech+Mono" rel="stylesheet">
  <style>
    * { margin:0; padding:0; -webkit-box-sizing:border-box; box-sizing:border-box; }
    html, body { width:100%; height:100%; overflow:hidden; }
    body {
      display:-webkit-box; display:-webkit-flex; display:flex;
      -webkit-box-align:center; -webkit-align-items:center; align-items:center;
      -webkit-box-pack:center;  -webkit-justify-content:center; justify-content:center;
      font-family:'Share Tech Mono', monospace;
      -webkit-transition: background 1s; transition: background 1s;
    }

    /* ══ TEMA DÍA (07:00–19:59) ══ */
    body.day  { background:#0D1117; }
    body.day .watch {
      background:#111820; border:2px solid #1E3A5F;
      -webkit-box-shadow: 0 0 40px rgba(0,160,255,0.15), inset 0 0 60px rgba(0,0,0,0.4);
              box-shadow: 0 0 40px rgba(0,160,255,0.15), inset 0 0 60px rgba(0,0,0,0.4);
    }
    body.day .header        { border-bottom:1px solid #1A2E44; color:#4A8AB0; }
    body.day .modes button  { border:1px solid #1A2E44; color:#3A6A88; }
    body.day .modes button.active { color:#7DD4FF; border-color:#7DD4FF; }
    body.day .lcd           { color:#7DD4FF; text-shadow:0 0 30px rgba(125,212,255,0.9),0 0 60px rgba(125,212,255,0.4); }
    body.day .time-block    { border-bottom:1px solid #1A2E44; }
    body.day .panel         { border-right:1px solid #1A2E44; }
    body.day .panel-label   { color:#4A8AB0; border-bottom:1px solid #1A2E44; }
    body.day .temp          { color:#7DD4FF; text-shadow:0 0 20px rgba(125,212,255,0.6); }
    body.day .weather-item  { color:#4A8AB0; }
    body.day .msg           { color:#2A5070; }
    body.day .err           { color:#A04030; }
    body.day .date-display  { color:#7DD4FF; }
    body.day .festivo-item  { border-left:2px solid #2A5070; }
    body.day .festivo-fecha  { color:#4A8AB0; }
    body.day .festivo-nombre { color:#7DD4FF; }
    body.day .festivo-dias   { color:#2A5070; }
    body.day .night-dot      { background:#7DD4FF; }
    body.day .seconds-display { color:#4A8AB0; }

    /* ══ TEMA NOCHE (20:00–06:59) ══ */
    body.night { background:#04060A; }
    body.night .watch {
      background:#070C12; border:2px solid #0E2235;
      -webkit-box-shadow: 0 0 15px rgba(0,80,140,0.08), inset 0 0 60px rgba(0,0,0,0.7);
              box-shadow: 0 0 15px rgba(0,80,140,0.08), inset 0 0 60px rgba(0,0,0,0.7);
    }
    body.night .header        { border-bottom:1px solid #0C1C2C; color:#224058; }
    body.night .modes button  { border:1px solid #0C1C2C; color:#1A3448; }
    body.night .modes button.active { color:#3A7AAA; border-color:#3A7AAA; }
    body.night .lcd           { color:#2E6088; text-shadow:0 0 18px rgba(46,96,136,0.4); }
    body.night .time-block    { border-bottom:1px solid #0C1C2C; }
    body.night .panel         { border-right:1px solid #0C1C2C; }
    body.night .panel-label   { color:#1E3A50; border-bottom:1px solid #0C1C2C; }
    body.night .temp          { color:#2E6088; text-shadow:0 0 10px rgba(46,96,136,0.2); }
    body.night .weather-item  { color:#1E3A50; }
    body.night .msg           { color:#122030; }
    body.night .err           { color:#5A2018; }
    body.night .date-display  { color:#2E6088; }
    body.night .festivo-item  { border-left:2px solid #122030; }
    body.night .festivo-fecha  { color:#1E3A50; }
    body.night .festivo-nombre { color:#2E6088; }
    body.night .festivo-dias   { color:#122030; }
    body.night .night-dot      { background:#2E6088; }
    body.night .seconds-display { color:#1E3A50; }

    /* ══ ESTRUCTURA ══ */
    .watch {
      width:92vw; height:88vh; border-radius:10px; position:relative;
      display:-webkit-box; display:-webkit-flex; display:flex;
      -webkit-box-orient:vertical; -webkit-flex-direction:column; flex-direction:column;
      overflow:hidden;
      -webkit-transition: background 1s, border-color 1s; transition: background 1s, border-color 1s;
    }
    .header {
      padding:8px 18px;
      display:-webkit-box; display:-webkit-flex; display:flex;
      -webkit-box-pack:justify; -webkit-justify-content:space-between; justify-content:space-between;
      -webkit-box-align:center; -webkit-align-items:center; align-items:center;
      font-size:12px; letter-spacing:2px;
      -webkit-transition: border-color 1s, color 1s; transition: border-color 1s, color 1s;
    }
    .modes button {
      background:none; padding:4px 10px; margin-left:5px;
      font-size:11px; cursor:pointer; letter-spacing:1px;
      font-family:'Share Tech Mono', monospace;
      -webkit-appearance:none; border-radius:3px;
      -webkit-transition: color 0.3s, border-color 0.3s; transition: color 0.3s, border-color 0.3s;
    }
    .night-dot {
      display:inline-block; width:6px; height:6px; border-radius:50%;
      margin-right:6px; vertical-align:middle;
      -webkit-animation: pulse 2s infinite; animation: pulse 2s infinite;
      -webkit-transition: background 1s; transition: background 1s;
    }
    @-webkit-keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.25} }
    @keyframes          pulse { 0%,100%{opacity:1} 50%{opacity:0.25} }

    .seconds-display {
      font-family:'Orbitron', monospace; font-weight:700;
      font-size:15px; letter-spacing:3px;
      -webkit-transition: color 1s; transition: color 1s;
    }

    .time-block {
      -webkit-box-flex:1; -webkit-flex:1; flex:1;
      display:-webkit-box; display:-webkit-flex; display:flex;
      -webkit-box-orient:vertical; -webkit-flex-direction:column; flex-direction:column;
      -webkit-box-align:center; -webkit-align-items:center; align-items:center;
      -webkit-box-pack:center;  -webkit-justify-content:center; justify-content:center;
      -webkit-transition: border-color 1s; transition: border-color 1s;
    }
    .lcd {
      font-family:'Orbitron', monospace; font-weight:900;
      font-size:19vw; letter-spacing:-1px; line-height:1;
      -webkit-transition: color 1s, text-shadow 1s; transition: color 1s, text-shadow 1s;
    }
    .sep {
      -webkit-animation: blink 1s infinite; animation: blink 1s infinite;
      display:inline-block;
    }
    @-webkit-keyframes blink { 50%{opacity:0.12} }
    @keyframes          blink { 50%{opacity:0.12} }

    .bottom {
      display:-webkit-box; display:-webkit-flex; display:flex;
      -webkit-box-flex:1; -webkit-flex:1; flex:1;
      min-height:0;
    }
    .panel {
      -webkit-box-flex:1; -webkit-flex:1; flex:1;
      padding:14px 22px; overflow:hidden;
      -webkit-transition: border-color 1s; transition: border-color 1s;
    }
    .panel:last-child { border-right:none !important; }
    .panel-label {
      font-size:12px; letter-spacing:2px; margin-bottom:8px; padding-bottom:4px;
      font-family:'Share Tech Mono', monospace;
      -webkit-transition: color 1s, border-color 1s; transition: color 1s, border-color 1s;
    }

    /* Clima */
    .temp {
      font-family:'Orbitron', monospace; font-weight:700; font-size:60px; line-height:1;
      -webkit-transition: color 1s, text-shadow 1s; transition: color 1s, text-shadow 1s;
    }
    .weather-row { margin-top:8px; }
    .weather-item {
      font-size:12px; letter-spacing:1px; line-height:1.7;
      font-family:'Share Tech Mono', monospace;
      -webkit-transition: color 1s; transition: color 1s;
    }
    .msg {
      font-size:13px; letter-spacing:1px; line-height:1.8;
      font-family:'Share Tech Mono', monospace;
      -webkit-transition: color 1s; transition: color 1s;
    }
    .err { font-size:12px; letter-spacing:1px; font-family:'Share Tech Mono', monospace; }

    /* Festivos */
    .date-display {
      font-family:'Orbitron', monospace; font-weight:700;
      font-size:14px; letter-spacing:2px; margin-bottom:14px;
      -webkit-transition: color 1s; transition: color 1s;
    }
    .festivo-item {
      padding:4px 0 4px 10px; margin-bottom:10px;
      -webkit-transition: border-color 1s; transition: border-color 1s;
    }
    .festivo-fecha {
      font-size:11px; letter-spacing:1px; font-family:'Share Tech Mono', monospace;
      -webkit-transition: color 1s; transition: color 1s;
    }
    .festivo-nombre {
      font-family:'Orbitron', monospace; font-weight:700; font-size:12px;
      letter-spacing:1px; line-height:1.4;
      -webkit-transition: color 1s; transition: color 1s;
    }
    .festivo-dias {
      font-size:11px; letter-spacing:1px; font-family:'Share Tech Mono', monospace;
      margin-top:1px; -webkit-transition: color 1s; transition: color 1s;
    }
  </style>
</head>
<body class="day">
<div class="watch">

  <div class="header">
    <div><span class="night-dot"></span>CASIO · WORLD TIME</div>
    <div class="seconds-display" id="seconds">00</div>
    <div class="modes">
      <button id="btn-day"   onclick="forceMode('day')">DÍA</button>
      <button id="btn-night" onclick="forceMode('night')">NOCHE</button>
      <button id="btn-auto"  onclick="forceMode('auto')" class="active">AUTO</button>
    </div>
  </div>

  <div class="time-block">
    <div class="lcd" id="time">00<span class="sep">:</span>00</div>
  </div>

  <div class="bottom">
    <div class="panel">
      <div class="panel-label">▲ CLIMA / PUEBLA</div>
      <div id="weather"><div class="msg">CARGANDO CLIMA...</div></div>
    </div>
    <div class="panel">
      <div class="panel-label">■ FECHA Y DÍAS FESTIVOS</div>
      <div id="festivos"></div>
    </div>
  </div>

</div>

<script>
  /* ── CONSTANTES ── */
  var LAT   = 19.0414;
  var LON   = -98.2063;
  var DIAS  = ['DOM','LUN','MAR','MIÉ','JUE','VIE','SÁB'];
  var MESES = ['ENE','FEB','MAR','ABR','MAY','JUN','JUL','AGO','SEP','OCT','NOV','DIC'];
  function pad(n) { return n < 10 ? '0' + n : n; }

  /* ── MODO DÍA / NOCHE ── */
  var modeOverride = 'auto';

  function applyMode(m) {
    document.body.className = m;
  }
  function checkMode() {
    if (modeOverride !== 'auto') { applyMode(modeOverride); return; }
    var h = new Date().getHours();
    applyMode((h >= 20 || h < 7) ? 'night' : 'day');
  }
  function forceMode(m) {
    modeOverride = m;
    var btns = document.getElementsByTagName('button');
    for (var i=0; i<btns.length; i++) {
      btns[i].className = btns[i].className.replace(/\bactive\b/,'').trim();
    }
    var btn = document.getElementById('btn-' + m);
    if (btn) btn.className = (btn.className + ' active').trim();
    checkMode();
  }
  checkMode();
  setInterval(checkMode, 30000);

  /* ── RELOJ ── */
  function updateClock() {
    var now = new Date();
    document.getElementById('time').innerHTML =
      pad(now.getHours()) + '<span class="sep">:</span>' + pad(now.getMinutes());
    document.getElementById('seconds').textContent = pad(now.getSeconds());
  }
  updateClock();
  setInterval(updateClock, 1000);

  /* ── FESTIVOS MÉXICO 2026-2027 ── */
  var FESTIVOS = [
    {fecha:'2026-01-01',nombre:'AÑO NUEVO'},
    {fecha:'2026-02-02',nombre:'DÍA DE LA CANDELARIA'},
    {fecha:'2026-02-05',nombre:'DÍA DE LA CONSTITUCIÓN'},
    {fecha:'2026-03-16',nombre:'NATALICIO DE BENITO JUÁREZ'},
    {fecha:'2026-04-02',nombre:'JUEVES SANTO'},
    {fecha:'2026-04-03',nombre:'VIERNES SANTO'},
    {fecha:'2026-05-01',nombre:'DÍA DEL TRABAJO'},
    {fecha:'2026-05-10',nombre:'DÍA DE LAS MADRES'},
    {fecha:'2026-09-16',nombre:'DÍA DE LA INDEPENDENCIA'},
    {fecha:'2026-11-02',nombre:'DÍA DE MUERTOS'},
    {fecha:'2026-11-16',nombre:'REVOLUCIÓN MEXICANA'},
    {fecha:'2026-12-12',nombre:'VIRGEN DE GUADALUPE'},
    {fecha:'2026-12-25',nombre:'NAVIDAD'},
    {fecha:'2027-01-01',nombre:'AÑO NUEVO'},
    {fecha:'2027-02-05',nombre:'DÍA DE LA CONSTITUCIÓN'},
    {fecha:'2027-03-21',nombre:'NATALICIO DE BENITO JUÁREZ'},
    {fecha:'2027-03-25',nombre:'JUEVES SANTO'},
    {fecha:'2027-03-26',nombre:'VIERNES SANTO'},
    {fecha:'2027-05-01',nombre:'DÍA DEL TRABAJO'},
    {fecha:'2027-05-10',nombre:'DÍA DE LAS MADRES'},
    {fecha:'2027-09-16',nombre:'DÍA DE LA INDEPENDENCIA'},
    {fecha:'2027-11-02',nombre:'DÍA DE MUERTOS'},
    {fecha:'2027-11-15',nombre:'REVOLUCIÓN MEXICANA'},
    {fecha:'2027-12-12',nombre:'VIRGEN DE GUADALUPE'},
    {fecha:'2027-12-25',nombre:'NAVIDAD'}
  ];

  function renderFestivos() {
    var now  = new Date();
    var hoy  = now.getFullYear() + '-' + pad(now.getMonth()+1) + '-' + pad(now.getDate());
    var html = '<div class="date-display">' +
      DIAS[now.getDay()] + '  ' + pad(now.getDate()) + ' ' +
      MESES[now.getMonth()] + ' ' + now.getFullYear() +
    '</div>';
    var count = 0;
    for (var i=0; i<FESTIVOS.length && count<3; i++) {
      if (FESTIVOS[i].fecha < hoy) continue;
      var f     = FESTIVOS[i];
      var p     = f.fecha.split('-');
      var fd    = new Date(parseInt(p[0]), parseInt(p[1])-1, parseInt(p[2]));
      var hoyD  = new Date(now.getFullYear(), now.getMonth(), now.getDate());
      var diff  = Math.round((fd - hoyD) / 86400000);
      var etiq  = diff===0 ? '— HOY —' : diff===1 ? 'MAÑANA' : 'EN ' + diff + ' DÍAS';
      html += '<div class="festivo-item">' +
        '<div class="festivo-fecha">' + DIAS[fd.getDay()] + '  ' + pad(fd.getDate()) + ' ' + MESES[fd.getMonth()] + ' ' + fd.getFullYear() + '</div>' +
        '<div class="festivo-nombre">' + f.nombre + '</div>' +
        '<div class="festivo-dias">' + etiq + '</div>' +
      '</div>';
      count++;
    }
    document.getElementById('festivos').innerHTML = html;
  }
  renderFestivos();
  setInterval(renderFestivos, 60000);

  /* ── CLIMA — XMLHttpRequest (sin fetch, compatible iOS 9) ── */
  var WMO = {
    0:'DESPEJADO',1:'CASI DESPEJADO',2:'PARCIAL. NUBLADO',3:'NUBLADO',
    45:'NEBLINA',48:'NEBLINA C/HIELO',
    51:'LLOVIZNA LIGERA',53:'LLOVIZNA',55:'LLOVIZNA INTENSA',
    61:'LLUVIA LIGERA',63:'LLUVIA',65:'LLUVIA INTENSA',
    71:'NIEVE LIGERA',73:'NIEVE',75:'NIEVE INTENSA',
    80:'CHUBASCOS',81:'CHUBASCOS FUERTES',82:'CHUBASCOS VIOLENTOS',
    95:'TORMENTA',96:'TORMENTA C/GRANIZO',99:'TORMENTA FUERTE'
  };

  function loadWeather() {
    var url = 'https://api.open-meteo.com/v1/forecast' +
      '?latitude='  + LAT + '&longitude=' + LON +
      '&current=temperature_2m,apparent_temperature,weathercode,windspeed_10m,relative_humidity_2m' +
      '&daily=temperature_2m_max,temperature_2m_min,weathercode' +
      '&timezone=America%2FMexico_City&forecast_days=3';
    var xhr = new XMLHttpRequest();
    xhr.open('GET', url, true);
    xhr.onreadystatechange = function() {
      if (xhr.readyState !== 4) return;
      if (xhr.status !== 200) {
        document.getElementById('weather').innerHTML =
          '<div class="err">ERROR HTTP ' + xhr.status + '</div><div class="msg" style="margin-top:6px;">REINTENTANDO...</div>';
        setTimeout(loadWeather, 30000); return;
      }
      try {
        var data = JSON.parse(xhr.responseText);
        var c = data.current; var d = data.daily;
        var desc = WMO[c.weathercode] || 'COD:'+c.weathercode;
        var html = '<div class="temp">' + Math.round(c.temperature_2m) + '°</div>';
        html += '<div class="weather-row">';
        html += '<div class="weather-item">ST ' + Math.round(c.apparent_temperature) + '°  HUM ' + c.relative_humidity_2m + '%</div>';
        html += '<div class="weather-item">VIENTO ' + Math.round(c.windspeed_10m) + ' KM/H</div>';
        html += '<div class="weather-item">' + desc + '</div></div>';
        if (d && d.time) {
          html += '<div style="margin-top:10px;">';
          var n = d.time.length < 3 ? d.time.length : 3;
          for (var i=0; i<n; i++) {
            var dt = new Date(d.time[i] + 'T12:00:00');
            html += '<div class="weather-item">' + DIAS[dt.getDay()] + ' ' +
              Math.round(d.temperature_2m_min[i]) + '/' + Math.round(d.temperature_2m_max[i]) + '°  ' +
              (WMO[d.weathercode[i]]||'').substring(0,16) + '</div>';
          }
          html += '</div>';
        }
        document.getElementById('weather').innerHTML = html;
      } catch(e) {
        document.getElementById('weather').innerHTML = '<div class="err">ERROR DE DATOS</div>';
      }
    };
    xhr.onerror = function() {
      document.getElementById('weather').innerHTML =
        '<div class="err">SIN CONEXIÓN</div><div class="msg" style="margin-top:6px;">REINTENTANDO...</div>';
      setTimeout(loadWeather, 60000);
    };
    xhr.send();
  }
  loadWeather();
  setInterval(loadWeather, 600000);
</script>
</body>
</html>
