<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>CASIO</title>

  <!-- PWA -->
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#04070B">
  <meta name="mobile-web-app-capable" content="yes">

  <!-- iOS icons -->
  <link rel="apple-touch-icon" sizes="192x192" href="/icon-192.png">
  <link rel="apple-touch-icon" sizes="512x512" href="/icon-512.png">

  <!-- Compatibilidad conservadora -->
  <link href="https://fonts.googleapis.com/css?family=Orbitron:400,700,900|Share+Tech+Mono" rel="stylesheet">

  <style>
    * { margin:0; padding:0; -webkit-box-sizing:border-box; box-sizing:border-box; }

    html, body {
      width:100%;
      height:100%;
      overflow:hidden;
    }

    body {
      background:#030508;
      font-family:'Share Tech Mono', monospace;
      -webkit-tap-highlight-color:transparent;
      -webkit-user-select:none;
      user-select:none;
      -webkit-transition:background 1s;
      transition:background 1s;
    }

    body.day { background:#091018; }
    body.night { background:#030508; }

    #statusbar-cover {
      position:fixed;
      top:0; left:0; right:0;
      height:24px;
      z-index:9999;
      pointer-events:none;
      -webkit-transition:background 1s;
      transition:background 1s;
    }

    body.day #statusbar-cover { background:#091018; }
    body.night #statusbar-cover { background:#030508; }

    .screen {
      position:relative;
      width:100vw;
      height:100vh;
      overflow:hidden;
    }

    /* Elementos flotantes */
    .floating {
      position:absolute;
      -webkit-transition:
        left 2.2s ease,
        top 2.2s ease,
        opacity 1s ease,
        color 1s ease,
        text-shadow 1s ease;
      transition:
        left 2.2s ease,
        top 2.2s ease,
        opacity 1s ease,
        color 1s ease,
        text-shadow 1s ease;
      white-space:nowrap;
    }

    /* Hora */
    #clock-wrap {
      z-index:3;
    }

    #time {
      font-family:'Orbitron', monospace;
      font-weight:700;
      font-size:24vw;
      line-height:0.9;
      letter-spacing:-0.03em;
    }

    .sep {
      display:inline-block;
      opacity:0.55;
      -webkit-animation:softblink 2.6s infinite;
      animation:softblink 2.6s infinite;
    }

    @-webkit-keyframes softblink { 0%,100%{opacity:0.55} 50%{opacity:0.25} }
    @keyframes softblink { 0%,100%{opacity:0.55} 50%{opacity:0.25} }

    #seconds {
      margin-top:8px;
      text-align:right;
      font-family:'Orbitron', monospace;
      font-weight:700;
      font-size:20px;
      letter-spacing:3px;
      opacity:0.7;
    }

    /* Fecha */
    #date-wrap {
      z-index:2;
      max-width:90vw;
      white-space:normal;
    }

    #date-text {
      font-family:'Orbitron', monospace;
      font-weight:700;
      font-size:24px;
      line-height:1.3;
      letter-spacing:1px;
      text-align:center;
    }

    /* Temperatura */
    #temp-wrap {
      z-index:2;
      text-align:center;
    }

    #temp-value {
      font-family:'Orbitron', monospace;
      font-weight:700;
      font-size:60px;
      line-height:1;
    }

    #temp-label {
      margin-top:6px;
      font-size:11px;
      letter-spacing:2px;
      opacity:0.75;
    }

    /* Tema día */
    body.day #time,
    body.day #date-text,
    body.day #temp-value {
      color:#6EB7DA;
      text-shadow:0 0 10px rgba(110,183,218,0.18);
    }

    body.day #seconds,
    body.day #temp-label {
      color:#426E88;
    }

    /* Tema noche */
    body.night #time,
    body.night #date-text,
    body.night #temp-value {
      color:#234A67;
      text-shadow:0 0 6px rgba(35,74,103,0.12);
    }

    body.night #seconds,
    body.night #temp-label {
      color:#193140;
    }

    /* Descanso nocturno */
    .rest-mode #time,
    .rest-mode #date-text,
    .rest-mode #temp-value {
      text-shadow:none !important;
      opacity:0.78;
    }

    .rest-mode #seconds,
    .rest-mode #temp-label {
      opacity:0.38;
    }

    /* Móviles pequeños */
    @media screen and (max-width:480px) {
      #time { font-size:26vw; }
      #date-text { font-size:21px; }
      #temp-value { font-size:52px; }
      #seconds { font-size:16px; }
    }
  </style>
</head>
<body class="night">
  <div id="statusbar-cover"></div>

  <div class="screen" id="screen">
    <div class="floating" id="clock-wrap">
      <div id="time">00<span class="sep">:</span>00</div>
      <div id="seconds">00</div>
    </div>

    <div class="floating" id="date-wrap">
      <div id="date-text">Sábado, 18 de abril de 2026</div>
    </div>

    <div class="floating" id="temp-wrap">
      <div id="temp-value">--°</div>
      <div id="temp-label">PUEBLA</div>
    </div>
  </div>

  <script>
    /* ── CONSTANTES ── */
    var LAT = 19.0414;
    var LON = -98.2063;

    var DIAS = ['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
    var MESES = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];

    var modeOverride = 'auto';
    var WMO = {
      0:'DESPEJADO',1:'CASI DESPEJADO',2:'PARCIAL. NUBLADO',3:'NUBLADO',
      45:'NEBLINA',48:'NEBLINA C/HIELO',
      51:'LLOVIZNA LIGERA',53:'LLOVIZNA',55:'LLOVIZNA INTENSA',
      61:'LLUVIA LIGERA',63:'LLUVIA',65:'LLUVIA INTENSA',
      71:'NIEVE LIGERA',73:'NIEVE',75:'NIEVE INTENSA',
      80:'CHUBASCOS',81:'CHUBASCOS FUERTES',82:'CHUBASCOS VIOLENTOS',
      95:'TORMENTA',96:'TORMENTA C/GRANIZO',99:'TORMENTA FUERTE'
    };

    function pad(n) { return n < 10 ? '0' + n : n; }

    function randomInt(min, max) {
      return Math.floor(Math.random() * (max - min + 1)) + min;
    }

    /* ── TEMA DÍA/NOCHE ── */
    function applyMode(m) {
      document.body.className = m;
      updateRestMode();
    }

    function checkMode() {
      if (modeOverride !== 'auto') {
        applyMode(modeOverride);
        return;
      }
      var h = new Date().getHours();
      applyMode((h >= 20 || h < 7) ? 'night' : 'day');
    }

    checkMode();
    setInterval(checkMode, 30000);

    /* ── RELOJ ── */
    function updateClock() {
      var now = new Date();
      document.getElementById('time').innerHTML =
        pad(now.getHours()) + '<span class="sep">:</span>' + pad(now.getMinutes());
      document.getElementById('seconds').innerHTML = pad(now.getSeconds());
    }

    updateClock();
    setInterval(updateClock, 1000);

    /* ── FECHA COMPLETA ── */
    function updateDate() {
      var now = new Date();
      var texto = DIAS[now.getDay()] + ', ' + now.getDate() + ' de ' + MESES[now.getMonth()] + ' de ' + now.getFullYear();
      document.getElementById('date-text').innerHTML = texto;
    }

    updateDate();
    setInterval(updateDate, 60000);

    /* ── CLIMA / SOLO TEMPERATURA ── */
    function loadWeather() {
      var url = 'https://api.open-meteo.com/v1/forecast' +
        '?latitude=' + LAT +
        '&longitude=' + LON +
        '&current=temperature_2m,weathercode' +
        '&timezone=America%2FMexico_City' +
        '&forecast_days=1';

      var xhr = new XMLHttpRequest();
      xhr.open('GET', url, true);

      xhr.onreadystatechange = function() {
        if (xhr.readyState !== 4) return;

        if (xhr.status !== 200) {
          setTimeout(loadWeather, 30000);
          return;
        }

        try {
          var data = JSON.parse(xhr.responseText);
          var c = data.current;
          document.getElementById('temp-value').innerHTML = Math.round(c.temperature_2m) + '°';
        } catch(e) {}
      };

      xhr.onerror = function() {
        setTimeout(loadWeather, 60000);
      };

      xhr.send();
    }

    loadWeather();
    setInterval(loadWeather, 600000);

    /* ── MODO DESCANSO ── */
    function updateRestMode() {
      var h = new Date().getHours();
      var body = document.body;
      body.className = body.className.replace(/\brest-mode\b/g, '').replace(/\s+/g, ' ').replace(/^\s+|\s+$/g, '');
      if (h >= 1 && h < 6) {
        body.className += ' rest-mode';
      }
    }

    updateRestMode();
    setInterval(updateRestMode, 60000);

    /* ── POSICIONES SEGURAS Y MOVIMIENTO ALEATORIO ── */

    /*
      Se usan zonas amplias para repartir desgaste.
      No siempre misma secuencia.
      Además evitamos superposición excesiva.
    */

    var zones = [
      { name:'top-left',     cx:18, cy:18 },
      { name:'top-center',   cx:50, cy:16 },
      { name:'top-right',    cx:82, cy:18 },
      { name:'mid-left',     cx:18, cy:44 },
      { name:'mid-center',   cx:50, cy:45 },
      { name:'mid-right',    cx:82, cy:44 },
      { name:'low-left',     cx:18, cy:72 },
      { name:'low-center',   cx:50, cy:74 },
      { name:'low-right',    cx:82, cy:72 }
    ];

    var lastZoneClock = -1;
    var lastZoneDate = -1;
    var lastZoneTemp = -1;

    function setElementPosition(el, cx, cy) {
      el.style.left = cx + '%';
      el.style.top = cy + '%';
    }

    function getRandomZoneIndex(excludeA, excludeB, excludeC) {
      var candidates = [];
      var i;

      for (i = 0; i < zones.length; i++) {
        if (i === excludeA || i === excludeB || i === excludeC) continue;
        candidates.push(i);
      }

      if (candidates.length === 0) {
        for (i = 0; i < zones.length; i++) candidates.push(i);
      }

      return candidates[randomInt(0, candidates.length - 1)];
    }

    function moveFloatingElements() {
      var clock = document.getElementById('clock-wrap');
      var date = document.getElementById('date-wrap');
      var temp = document.getElementById('temp-wrap');

      var zClock = getRandomZoneIndex(lastZoneClock, lastZoneDate, lastZoneTemp);
      var zDate  = getRandomZoneIndex(zClock, lastZoneDate, lastZoneTemp);
      var zTemp  = getRandomZoneIndex(zClock, zDate, lastZoneTemp);

      lastZoneClock = zClock;
      lastZoneDate = zDate;
      lastZoneTemp = zTemp;

      /* Pequeña variación aleatoria dentro de cada zona */
      var jx1 = randomInt(-4, 4);
      var jy1 = randomInt(-4, 4);
      var jx2 = randomInt(-4, 4);
      var jy2 = randomInt(-3, 3);
      var jx3 = randomInt(-4, 4);
      var jy3 = randomInt(-3, 3);

      setElementPosition(clock, zones[zClock].cx + jx1, zones[zClock].cy + jy1);
      setElementPosition(date,  zones[zDate].cx  + jx2, zones[zDate].cy  + jy2);
      setElementPosition(temp,  zones[zTemp].cx  + jx3, zones[zTemp].cy  + jy3);

      /* Centrar visualmente según tipo */
      clock.style.webkitTransform = 'translate(-50%,-50%)';
      clock.style.transform = 'translate(-50%,-50%)';

      date.style.webkitTransform = 'translate(-50%,-50%)';
      date.style.transform = 'translate(-50%,-50%)';

      temp.style.webkitTransform = 'translate(-50%,-50%)';
      temp.style.transform = 'translate(-50%,-50%)';
    }

    /* Movimiento inicial */
    moveFloatingElements();

    /* Cada pocos minutos, pero no exacto siempre */
    function scheduleNextMove() {
      var nextMs = randomInt(120000, 240000); /* 2 a 4 minutos */
      setTimeout(function() {
        moveFloatingElements();
        scheduleNextMove();
      }, nextMs);
    }

    scheduleNextMove();

    /* ── MICROREFRESCO SUAVE EXTRA ── */
    function nudgeElements() {
      var ids = ['clock-wrap', 'date-wrap', 'temp-wrap'];
      var i, el, dx, dy;
      for (i = 0; i < ids.length; i++) {
        el = document.getElementById(ids[i]);
        dx = randomInt(-1, 1);
        dy = randomInt(-1, 1);
        el.style.marginLeft = dx + 'px';
        el.style.marginTop = dy + 'px';
      }
    }

    setInterval(nudgeElements, 45000);

    /* ── SERVICE WORKER ── */
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js').catch(function() {});
    }

    document.oncontextmenu = function() { return false; };
    document.ontouchstart = function(){};
  </script>
</body>
</html>
