<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <title>CASIO</title>
  <style>
    @font-face {
      font-family: 'DSEG7';
      src: url('https://cdn.jsdelivr.net/npm/dseg@0.46.0/fonts/DSEG7-Classic/DSEG7Classic-Regular.woff2') format('woff2');
    }
  </style>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    html, body { width:100%; height:100%; overflow:hidden; background:#0A0A08; }
    body { display:flex; align-items:center; justify-content:center; font-family:'Share Tech Mono', monospace; }

    .watch {
      width:92vw; height:88vh;
      border:3px solid #3A5220; border-radius:8px;
      background:#141F0C; position:relative; display:flex; flex-direction:column; overflow:hidden;
    }
    .header {
      padding:8px 20px; display:flex; justify-content:space-between; align-items:center;
      border-bottom:1px solid #1E2E10; color:#527030; font-size:14px; letter-spacing:2px;
    }
    .modes button {
      background:none; border:1px solid #1E2E10; color:#4A6228; padding:4px 10px; margin-left:6px; font-size:12px; cursor:pointer;
    }
    .modes button.active { color:#B8D870; border-color:#B8D870; }

    .time-block {
      flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; border-bottom:1px solid #1E2E10;
    }
    .lcd {
      font-family:'DSEG7', monospace;
      font-size:18vw; letter-spacing:4px; color:#B8D870;
      text-shadow:0 0 20px rgba(184,216,112,0.6);
    }
    .ghost {
      position:absolute; font-family:'DSEG7', monospace; font-size:18vw; letter-spacing:4px; color:#1E2E10; opacity:0.6;
    }
    .sep { animation: blink 1s infinite; }
    @keyframes blink { 50% { opacity: 0.2; } }

    .date {
      margin-top:20px; font-size:28px; color:#B8D870; letter-spacing:3px;
    }

    .bottom { display:flex; flex:1; }
    .panel {
      flex:1; padding:15px 25px; border-right:1px solid #1E2E10;
    }
    .panel:last-child { border-right:none; }
    .panel-label {
      font-size:13px; letter-spacing:2px; color:#527030; margin-bottom:8px; border-bottom:1px solid #1E2E10; padding-bottom:4px;
    }
    .temp {
      font-family:'DSEG7', monospace; font-size:80px; color:#B8D870; line-height:1;
    }
    .msg { color:#4A6228; font-size:15px; letter-spacing:1px; }
  </style>
</head>
<body>

<div class="watch">
  <div class="header">
    <div>● CASIO · WORLD TIME</div>
    <div id="seconds">00</div>
    <div class="modes">
      <button onclick="setTheme('green')" id="btn-green" class="active">GRN</button>
      <button onclick="setTheme('blue')" id="btn-blue">BLU</button>
      <button onclick="setTheme('mono')" id="btn-mono">B&W</button>
    </div>
  </div>

  <div class="time-block">
    <div style="position:relative;">
      <div class="ghost" id="ghost">88:88</div>
      <div class="lcd" id="time">19:45</div>
    </div>
    <div class="date" id="date">SÁB 18-ABR-2026</div>
  </div>

  <div class="bottom">
    <div class="panel">
      <div class="panel-label">▲ CLIMA / PUEBLA</div>
      <div id="weather"><div class="msg">CARGANDO CLIMA...</div></div>
    </div>
    <div class="panel">
      <div class="panel-label">■ AGENDA — PRÓXIMOS 7 DÍAS</div>
      <div id="agenda"><div class="msg">NO EVENTS_</div></div>
    </div>
  </div>
</div>

<script>
  var LAT = 19.0414;
  var LON = -98.2063;

  function pad(n) { return n < 10 ? '0' + n : n; }

  function updateClock() {
    var now = new Date();
    document.getElementById('time').textContent = pad(now.getHours()) + ':' + pad(now.getMinutes());
    document.getElementById('seconds').textContent = pad(now.getSeconds());
    document.getElementById('date').textContent = 
      ['DOM','LUN','MAR','MIÉ','JUE','VIE','SÁB'][now.getDay()] + ' ' +
      pad(now.getDate()) + '-ABR-2026';   // simplificado para hoy
  }

  function setTheme(theme) {
    document.querySelectorAll('.modes button').forEach(b => b.classList.remove('active'));
    document.getElementById('btn-' + theme).classList.add('active');
  }

  // Inicializar
  updateClock();
  setInterval(updateClock, 1000);

  // Clima y agenda se cargan desde el backend de Vercel
  // (si no cargan, aparecerá el mensaje de loading)
</script>
</body>
</html>
