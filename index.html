<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>CASIO</title>

  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#04070B">
  <meta name="mobile-web-app-capable" content="yes">

  <link rel="apple-touch-icon" sizes="192x192" href="/icon-192.png">
  <link rel="apple-touch-icon" sizes="512x512" href="/icon-512.png">

  <link href="https://fonts.googleapis.com/css?family=Orbitron:400,700,900|Share+Tech+Mono" rel="stylesheet">

  <style>
    * { margin:0; padding:0; -webkit-box-sizing:border-box; box-sizing:border-box; }

    html, body {
      width:100%;
      height:100%;
      overflow:hidden;
    }

    body {
      background:#030508;
      font-family:'Share Tech Mono', monospace;
      -webkit-tap-highlight-color:transparent;
      -webkit-user-select:none;
      user-select:none;
      -webkit-transition:background 1s;
      transition:background 1s;
    }

    body.day { background:#091018; }
    body.night { background:#030508; }

    #statusbar-cover {
      position:fixed;
      top:0; left:0; right:0;
      height:24px;
      z-index:9999;
      pointer-events:none;
      -webkit-transition:background 1s;
      transition:background 1s;
    }

    body.day #statusbar-cover { background:#091018; }
    body.night #statusbar-cover { background:#030508; }

    .screen {
      position:relative;
      width:100vw;
      height:100vh;
      overflow:hidden;
    }

    .floating {
      position:absolute;
      -webkit-transition:
        left 2.2s ease,
        top 2.2s ease,
        opacity 1s ease,
        color 1s ease,
        text-shadow 1s ease;
      transition:
        left 2.2s ease,
        top 2.2s ease,
        opacity 1s ease,
        color 1s ease,
        text-shadow 1s ease;
      white-space:nowrap;
    }

    /* BLOQUE HORA + FECHA */
    #clock-group {
      z-index:3;
      text-align:center;
      max-width:94vw;
    }

    #time {
      font-family:'Orbitron', monospace;
      font-weight:700;
      font-size:24vw;
      line-height:0.9;
      letter-spacing:-0.03em;
    }

    .sep {
      display:inline-block;
      opacity:0.55;
      -webkit-animation:softblink 2.6s infinite;
      animation:softblink 2.6s infinite;
    }

    @-webkit-keyframes softblink { 0%,100%{opacity:0.55} 50%{opacity:0.25} }
    @keyframes softblink { 0%,100%{opacity:0.55} 50%{opacity:0.25} }

    #seconds {
      margin-top:8px;
      text-align:right;
      font-family:'Orbitron', monospace;
      font-weight:700;
      font-size:20px;
      letter-spacing:3px;
      opacity:0.7;
    }

    #date-text {
      margin-top:10px;
      font-family:'Orbitron', monospace;
      font-weight:700;
      font-size:22px;
      line-height:1.2;
      letter-spacing:1px;
      text-align:center;
      white-space:nowrap;
    }

    /* TEMPERATURA */
    #temp-wrap {
      z-index:2;
      text-align:center;
    }

    #temp-value {
      font-family:'Orbitron', monospace;
      font-weight:700;
      font-size:60px;
      line-height:1;
    }

    #temp-label {
      margin-top:6px;
      font-size:11px;
      letter-spacing:2px;
      opacity:0.75;
    }

    /* Día */
    body.day #time,
    body.day #date-text,
    body.day #temp-value {
      color:#6EB7DA;
      text-shadow:0 0 10px rgba(110,183,218,0.18);
    }

    body.day #seconds,
    body.day #temp-label {
      color:#426E88;
    }

    /* Noche */
    body.night #time,
    body.night #date-text,
    body.night #temp-value {
      color:#234A67;
      text-shadow:0 0 6px rgba(35,74,103,0.12);
    }

    body.night #seconds,
    body.night #temp-label {
      color:#193140;
    }

    /* Descanso */
    .rest-mode #time,
    .rest-mode #date-text,
    .rest-mode #temp-value {
      text-shadow:none !important;
      opacity:0.78;
    }

    .rest-mode #seconds,
    .rest-mode #temp-label {
      opacity:0.38;
    }

    @media screen and (max-width:480px) {
      #time { font-size:26vw; }
      #date-text { font-size:18px; }
      #temp-value { font-size:52px; }
      #seconds { font-size:16px; }
    }
  </style>
</head>
<body class="night">
  <div id="statusbar-cover"></div>

  <div class="screen" id="screen">
    <div class="floating" id="clock-group">
      <div id="time">00<span class="sep">:</span>00</div>
      <div id="seconds">00</div>
      <div id="date-text">Sábado, 18 de abril de 2026</div>
    </div>

    <div class="floating" id="temp-wrap">
      <div id="temp-value">--°</div>
      <div id="temp-label">PUEBLA</div>
    </div>
  </div>

  <script>
    var LAT = 19.0414;
    var LON = -98.2063;

    var DIAS = ['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
    var MESES = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];

    var modeOverride = 'auto';

    function pad(n) { return n < 10 ? '0' + n : n; }

    function randomInt(min, max) {
      return Math.floor(Math.random() * (max - min + 1)) + min;
    }

    function applyMode(m) {
      document.body.className = m;
      updateRestMode();
    }

    function checkMode() {
      if (modeOverride !== 'auto') {
        applyMode(modeOverride);
        return;
      }
      var h = new Date().getHours();
      applyMode((h >= 20 || h < 7) ? 'night' : 'day');
    }

    checkMode();
    setInterval(checkMode, 30000);

    function updateClock() {
      var now = new Date();
      document.getElementById('time').innerHTML =
        pad(now.getHours()) + '<span class="sep">:</span>' + pad(now.getMinutes());
      document.getElementById('seconds').innerHTML = pad(now.getSeconds());
    }

    function updateDate() {
      var now = new Date();
      var texto = DIAS[now.getDay()] + ', ' + now.getDate() + ' de ' + MESES[now.getMonth()] + ' de ' + now.getFullYear();
      document.getElementById('date-text').innerHTML = texto;
    }

    updateClock();
    updateDate();
    setInterval(updateClock, 1000);
    setInterval(updateDate, 60000);

    function loadWeather() {
      var url = 'https://api.open-meteo.com/v1/forecast' +
        '?latitude=' + LAT +
        '&longitude=' + LON +
        '&current=temperature_2m,weathercode' +
        '&timezone=America%2FMexico_City' +
        '&forecast_days=1';

      var xhr = new XMLHttpRequest();
      xhr.open('GET', url, true);

      xhr.onreadystatechange = function() {
        if (xhr.readyState !== 4) return;

        if (xhr.status !== 200) {
          setTimeout(loadWeather, 30000);
          return;
        }

        try {
          var data = JSON.parse(xhr.responseText);
          var c = data.current;
          document.getElementById('temp-value').innerHTML = Math.round(c.temperature_2m) + '°';
        } catch(e) {}
      };

      xhr.onerror = function() {
        setTimeout(loadWeather, 60000);
      };

      xhr.send();
    }

    loadWeather();
    setInterval(loadWeather, 600000);

    function updateRestMode() {
      var h = new Date().getHours();
      var body = document.body;
      body.className = body.className.replace(/\brest-mode\b/g, '').replace(/\s+/g, ' ').replace(/^\s+|\s+$/g, '');
      if (h >= 1 && h < 6) {
        body.className += ' rest-mode';
      }
    }

    updateRestMode();
    setInterval(updateRestMode, 60000);

    /* ZONAS SEGURAS */
    var clockZones = [
      { cx:50, cy:24 },
      { cx:50, cy:34 },
      { cx:50, cy:46 },
      { cx:50, cy:58 },
      { cx:38, cy:34 },
      { cx:62, cy:34 },
      { cx:38, cy:50 },
      { cx:62, cy:50 }
    ];

    var tempZones = [
      { cx:18, cy:18 },
      { cx:82, cy:18 },
      { cx:18, cy:80 },
      { cx:82, cy:80 },
      { cx:20, cy:52 },
      { cx:80, cy:52 },
      { cx:50, cy:80 }
    ];

    var lastClockZone = -1;
    var lastTempZone = -1;

    function setElementPosition(el, cx, cy) {
      el.style.left = cx + '%';
      el.style.top = cy + '%';
    }

    function getRandomIndex(length, exclude) {
      var idx = randomInt(0, length - 1);
      if (length <= 1) return idx;
      while (idx === exclude) {
        idx = randomInt(0, length - 1);
      }
      return idx;
    }

    function moveElements() {
      var clock = document.getElementById('clock-group');
      var temp = document.getElementById('temp-wrap');

      var zClock = getRandomIndex(clockZones.length, lastClockZone);
      var zTemp = getRandomIndex(tempZones.length, lastTempZone);

      lastClockZone = zClock;
      lastTempZone = zTemp;

      var c = clockZones[zClock];
      var t = tempZones[zTemp];

      var cjx = randomInt(-4, 4);
      var cjy = randomInt(-3, 3);
      var tjx = randomInt(-4, 4);
      var tjy = randomInt(-3, 3);

      setElementPosition(clock, c.cx + cjx, c.cy + cjy);
      setElementPosition(temp, t.cx + tjx, t.cy + tjy);

      clock.style.webkitTransform = 'translate(-50%,-50%)';
      clock.style.transform = 'translate(-50%,-50%)';

      temp.style.webkitTransform = 'translate(-50%,-50%)';
      temp.style.transform = 'translate(-50%,-50%)';
    }

    moveElements();

    function scheduleNextMove() {
      var nextMs = randomInt(120000, 240000);
      setTimeout(function() {
        moveElements();
        scheduleNextMove();
      }, nextMs);
    }

    scheduleNextMove();

    function nudgeElements() {
      var clock = document.getElementById('clock-group');
      var temp = document.getElementById('temp-wrap');

      clock.style.marginLeft = randomInt(-1, 1) + 'px';
      clock.style.marginTop = randomInt(-1, 1) + 'px';

      temp.style.marginLeft = randomInt(-1, 1) + 'px';
      temp.style.marginTop = randomInt(-1, 1) + 'px';
    }

    setInterval(nudgeElements, 45000);

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js').catch(function() {});
    }

    document.oncontextmenu = function() { return false; };
    document.ontouchstart = function(){};
  </script>
</body>
</html>
