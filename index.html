<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>CASIO</title>

  <!-- PWA -->
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#05080C">
  <meta name="mobile-web-app-capable" content="yes">

  <!-- iOS icons -->
  <link rel="apple-touch-icon" sizes="192x192" href="/icon-192.png">
  <link rel="apple-touch-icon" sizes="512x512" href="/icon-512.png">

  <!--
    Compatibilidad conservadora:
    - Sin CSS custom properties
    - Flexbox con prefijos
    - Sin fetch()
    - ES5 puro
    - Sin funciones modernas
  -->
  <link href="https://fonts.googleapis.com/css?family=Orbitron:400,700,900|Share+Tech+Mono" rel="stylesheet">

  <style>
    * { margin:0; padding:0; -webkit-box-sizing:border-box; box-sizing:border-box; }

    html, body {
      width:100%;
      height:100%;
      overflow:hidden;
    }

    body {
      display:-webkit-box;
      display:-webkit-flex;
      display:flex;
      -webkit-box-align:center;
      -webkit-align-items:center;
      align-items:center;
      -webkit-box-pack:center;
      -webkit-justify-content:center;
      justify-content:center;
      font-family:'Share Tech Mono', monospace;
      -webkit-transition: background 1s;
      transition: background 1s;
      -webkit-tap-highlight-color: transparent;
    }

    /* Tapa status bar residual */
    #statusbar-cover {
      position:fixed;
      top:0;
      left:0;
      right:0;
      height:24px;
      z-index:9999;
      -webkit-transition: background 1s, opacity 1s;
      transition: background 1s, opacity 1s;
      pointer-events:none;
    }

    /* Contenedor para microdesplazamiento anti-burn-in */
    #screen-shift {
      width:100%;
      height:100%;
      position:relative;
      display:-webkit-box;
      display:-webkit-flex;
      display:flex;
      -webkit-box-align:center;
      -webkit-align-items:center;
      align-items:center;
      -webkit-box-pack:center;
      -webkit-justify-content:center;
      justify-content:center;
      will-change:transform;
      -webkit-transition: -webkit-transform 1.2s ease;
      transition: transform 1.2s ease;
    }

    /* ===== TEMA DÍA ===== */
    body.day { background:#0A0F14; }
    body.day #statusbar-cover { background:#0A0F14; opacity:1; }

    body.day .watch {
      background:#0E151C;
      border:1px solid #17324A;
      -webkit-box-shadow: 0 0 18px rgba(0,110,170,0.08), inset 0 0 36px rgba(0,0,0,0.45);
              box-shadow: 0 0 18px rgba(0,110,170,0.08), inset 0 0 36px rgba(0,0,0,0.45);
    }
    body.day .header        { border-bottom:1px solid #132739; color:#3F6A86; }
    body.day .modes button  { border:1px solid #17324A; color:#325870; }
    body.day .modes button.active { color:#6EB7DA; border-color:#6EB7DA; }
    body.day .lcd           { color:#6EB7DA; text-shadow:0 0 12px rgba(110,183,218,0.20); }
    body.day .time-block    { border-bottom:1px solid #132739; }
    body.day .panel         { border-right:1px solid #132739; }
    body.day .panel-label   { color:#426E88; border-bottom:1px solid #132739; }
    body.day .temp          { color:#6EB7DA; text-shadow:0 0 8px rgba(110,183,218,0.15); }
    body.day .weather-item  { color:#426E88; }
    body.day .msg           { color:#29465B; }
    body.day .err           { color:#9C4B3C; }
    body.day .date-display  { color:#6EB7DA; }
    body.day .festivo-item  { border-left:2px solid #223A4E; }
    body.day .festivo-fecha { color:#426E88; }
    body.day .festivo-nombre { color:#6EB7DA; }
    body.day .festivo-dias  { color:#29465B; }
    body.day .night-dot     { background:#6EB7DA; }
    body.day .seconds-display { color:#426E88; }

    /* ===== TEMA NOCHE ===== */
    body.night { background:#030508; }
    body.night #statusbar-cover { background:#030508; opacity:1; }

    body.night .watch {
      background:#05080C;
      border:1px solid #0A1824;
      -webkit-box-shadow: 0 0 8px rgba(0,60,100,0.04), inset 0 0 40px rgba(0,0,0,0.75);
              box-shadow: 0 0 8px rgba(0,60,100,0.04), inset 0 0 40px rgba(0,0,0,0.75);
    }
    body.night .header        { border-bottom:1px solid #09131D; color:#20384A; }
    body.night .modes button  { border:1px solid #0B1A27; color:#173040; }
    body.night .modes button.active { color:#35607A; border-color:#35607A; }
    body.night .lcd           { color:#244A68; text-shadow:0 0 7px rgba(36,74,104,0.14); }
    body.night .time-block    { border-bottom:1px solid #09131D; }
    body.night .panel         { border-right:1px solid #09131D; }
    body.night .panel-label   { color:#1A3141; border-bottom:1px solid #09131D; }
    body.night .temp          { color:#244A68; text-shadow:0 0 5px rgba(36,74,104,0.10); }
    body.night .weather-item  { color:#1A3141; }
    body.night .msg           { color:#12202B; }
    body.night .err           { color:#5A2018; }
    body.night .date-display  { color:#244A68; }
    body.night .festivo-item  { border-left:2px solid #101D28; }
    body.night .festivo-fecha { color:#1A3141; }
    body.night .festivo-nombre { color:#244A68; }
    body.night .festivo-dias  { color:#12202B; }
    body.night .night-dot     { background:#244A68; }
    body.night .seconds-display { color:#1A3141; }

    /* ===== ESTRUCTURA ===== */
    .watch {
      width:92vw;
      height:88vh;
      border-radius:10px;
      position:relative;
      display:-webkit-box;
      display:-webkit-flex;
      display:flex;
      -webkit-box-orient:vertical;
      -webkit-flex-direction:column;
      flex-direction:column;
      overflow:hidden;
      -webkit-transition: background 1s, border-color 1s, opacity 1s, -webkit-transform 1s;
      transition: background 1s, border-color 1s, opacity 1s, transform 1s;
    }

    .header {
      padding:8px 16px;
      display:-webkit-box;
      display:-webkit-flex;
      display:flex;
      -webkit-box-pack:justify;
      -webkit-justify-content:space-between;
      justify-content:space-between;
      -webkit-box-align:center;
      -webkit-align-items:center;
      align-items:center;
      font-size:11px;
      letter-spacing:2px;
      -webkit-transition: border-color 1s, color 1s, opacity 1s;
      transition: border-color 1s, color 1s, opacity 1s;
    }

    .modes {
      white-space:nowrap;
    }

    .modes button {
      background:none;
      padding:4px 8px;
      margin-left:4px;
      font-size:10px;
      cursor:pointer;
      letter-spacing:1px;
      font-family:'Share Tech Mono', monospace;
      -webkit-appearance:none;
      border-radius:3px;
      outline:none;
      -webkit-transition: color 0.3s, border-color 0.3s, opacity 0.3s;
      transition: color 0.3s, border-color 0.3s, opacity 0.3s;
    }

    .night-dot {
      display:inline-block;
      width:5px;
      height:5px;
      border-radius:50%;
      margin-right:6px;
      vertical-align:middle;
      -webkit-animation: pulse 3s infinite;
      animation: pulse 3s infinite;
      -webkit-transition: background 1s, opacity 1s;
      transition: background 1s, opacity 1s;
    }

    @-webkit-keyframes pulse { 0%,100%{opacity:0.75} 50%{opacity:0.25} }
    @keyframes pulse { 0%,100%{opacity:0.75} 50%{opacity:0.25} }

    .seconds-display {
      font-family:'Orbitron', monospace;
      font-weight:700;
      font-size:14px;
      letter-spacing:3px;
      -webkit-transition: color 1s, opacity 1s;
      transition: color 1s, opacity 1s;
    }

    .time-block {
      -webkit-box-flex:1;
      -webkit-flex:1;
      flex:1;
      display:-webkit-box;
      display:-webkit-flex;
      display:flex;
      -webkit-box-orient:vertical;
      -webkit-flex-direction:column;
      flex-direction:column;
      -webkit-box-align:center;
      -webkit-align-items:center;
      align-items:center;
      -webkit-box-pack:center;
      -webkit-justify-content:center;
      justify-content:center;
      -webkit-transition: border-color 1s, padding 1s;
      transition: border-color 1s, padding 1s;
      min-height:0;
    }

    .lcd {
      font-family:'Orbitron', monospace;
      font-weight:700;
      font-size:18vw;
      letter-spacing:0;
      line-height:1;
      -webkit-transition: color 1s, text-shadow 1s, opacity 1s, font-size 1s, -webkit-transform 1s;
      transition: color 1s, text-shadow 1s, opacity 1s, font-size 1s, transform 1s;
    }

    .sep {
      display:inline-block;
      opacity:0.62;
      -webkit-animation: softblink 2.5s infinite;
      animation: softblink 2.5s infinite;
    }

    @-webkit-keyframes softblink { 0%,100%{opacity:0.62} 50%{opacity:0.30} }
    @keyframes softblink { 0%,100%{opacity:0.62} 50%{opacity:0.30} }

    .bottom {
      display:-webkit-box;
      display:-webkit-flex;
      display:flex;
      -webkit-box-flex:1;
      -webkit-flex:1;
      flex:1;
      min-height:0;
      -webkit-transition: opacity 1.4s, -webkit-transform 1s;
      transition: opacity 1.4s, transform 1s;
    }

    .panel {
      -webkit-box-flex:1;
      -webkit-flex:1;
      flex:1;
      padding:12px 18px;
      overflow:hidden;
      -webkit-transition: border-color 1s, opacity 1s;
      transition: border-color 1s, opacity 1s;
    }

    .panel:last-child { border-right:none !important; }

    .panel-label {
      font-size:11px;
      letter-spacing:2px;
      margin-bottom:8px;
      padding-bottom:4px;
      font-family:'Share Tech Mono', monospace;
      -webkit-transition: color 1s, border-color 1s, opacity 1s;
      transition: color 1s, border-color 1s, opacity 1s;
    }

    /* Clima */
    .temp {
      font-family:'Orbitron', monospace;
      font-weight:700;
      font-size:50px;
      line-height:1;
      -webkit-transition: color 1s, text-shadow 1s, opacity 1s;
      transition: color 1s, text-shadow 1s, opacity 1s;
    }

    .weather-row { margin-top:8px; }

    .weather-item {
      font-size:11px;
      letter-spacing:1px;
      line-height:1.7;
      font-family:'Share Tech Mono', monospace;
      -webkit-transition: color 1s, opacity 1s;
      transition: color 1s, opacity 1s;
    }

    .msg {
      font-size:12px;
      letter-spacing:1px;
      line-height:1.7;
      font-family:'Share Tech Mono', monospace;
      -webkit-transition: color 1s, opacity 1s;
      transition: color 1s, opacity 1s;
    }

    .err {
      font-size:12px;
      letter-spacing:1px;
      font-family:'Share Tech Mono', monospace;
    }

    /* Festivos */
    .date-display {
      font-family:'Orbitron', monospace;
      font-weight:700;
      font-size:13px;
      letter-spacing:2px;
      margin-bottom:12px;
      -webkit-transition: color 1s, opacity 1s;
      transition: color 1s, opacity 1s;
    }

    .festivo-item {
      padding:4px 0 4px 9px;
      margin-bottom:9px;
      -webkit-transition: border-color 1s, opacity 1s;
      transition: border-color 1s, opacity 1s;
    }

    .festivo-fecha {
      font-size:10px;
      letter-spacing:1px;
      font-family:'Share Tech Mono', monospace;
      -webkit-transition: color 1s, opacity 1s;
      transition: color 1s, opacity 1s;
    }

    .festivo-nombre {
      font-family:'Orbitron', monospace;
      font-weight:700;
      font-size:11px;
      letter-spacing:1px;
      line-height:1.4;
      -webkit-transition: color 1s, opacity 1s;
      transition: color 1s, opacity 1s;
    }

    .festivo-dias {
      font-size:10px;
      letter-spacing:1px;
      font-family:'Share Tech Mono', monospace;
      margin-top:1px;
      -webkit-transition: color 1s, opacity 1s;
      transition: color 1s, opacity 1s;
    }

    /* ===== LAYOUTS ROTATIVOS ===== */
    .watch.layout-a .time-block {
      -webkit-box-pack:center;
      -webkit-justify-content:center;
      justify-content:center;
      padding-top:0;
      padding-bottom:0;
    }

    .watch.layout-b .time-block {
      -webkit-box-pack:start;
      -webkit-justify-content:flex-start;
      justify-content:flex-start;
      padding-top:5vh;
      padding-bottom:0;
    }

    .watch.layout-c .time-block {
      -webkit-box-pack:end;
      -webkit-justify-content:flex-end;
      justify-content:flex-end;
      padding-top:0;
      padding-bottom:5vh;
    }

    /* ===== MODO DESCANSO ===== */
    .watch.rest-mode .header {
      opacity:0.40;
    }

    .watch.rest-mode .bottom {
      opacity:0.18;
    }

    .watch.rest-mode .lcd {
      font-size:15vw;
      opacity:0.78;
    }

    .watch.rest-mode .seconds-display {
      opacity:0.35;
    }

    .watch.rest-mode .night-dot {
      opacity:0.28;
    }

    body.night .watch.rest-mode .lcd {
      color:#1D3C54;
      text-shadow:none;
    }

    body.day .watch.rest-mode .lcd {
      color:#4D8EAE;
      text-shadow:none;
    }

    /* ===== MODO ULTRA TENUE OPCIONAL AUTOMÁTICO ===== */
    .watch.dim-panels .bottom {
      opacity:0.34;
    }

    .watch.dim-panels .header {
      opacity:0.70;
    }

    /* ===== AJUSTES EN PANTALLAS PEQUEÑAS ===== */
    @media screen and (max-width: 480px) {
      .watch { width:95vw; height:90vh; }
      .lcd { font-size:20vw; }
      .temp { font-size:42px; }
      .panel { padding:10px 12px; }
      .header { padding:7px 10px; font-size:10px; }
      .modes button { font-size:9px; padding:3px 6px; }
      .seconds-display { font-size:12px; }
    }
  </style>
</head>
<body class="day">
  <div id="statusbar-cover"></div>

  <div id="screen-shift">
    <div class="watch layout-a" id="watch">
      <div class="header">
        <div><span class="night-dot"></span>CASIO · WORLD TIME</div>
        <div class="seconds-display" id="seconds">00</div>
        <div class="modes">
          <button id="btn-day" onclick="forceMode('day')">DÍA</button>
          <button id="btn-night" onclick="forceMode('night')">NOCHE</button>
          <button id="btn-auto" onclick="forceMode('auto')" class="active">AUTO</button>
        </div>
      </div>

      <div class="time-block">
        <div class="lcd" id="time">00<span class="sep">:</span>00</div>
      </div>

      <div class="bottom" id="bottom-panels">
        <div class="panel">
          <div class="panel-label">▲ CLIMA / PUEBLA</div>
          <div id="weather"><div class="msg">CARGANDO CLIMA...</div></div>
        </div>
        <div class="panel">
          <div class="panel-label">■ FECHA Y DÍAS FESTIVOS</div>
          <div id="festivos"></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    /* ── CONSTANTES ── */
    var LAT   = 19.0414;
    var LON   = -98.2063;
    var DIAS  = ['DOM','LUN','MAR','MIÉ','JUE','VIE','SÁB'];
    var MESES = ['ENE','FEB','MAR','ABR','MAY','JUN','JUL','AGO','SEP','OCT','NOV','DIC'];

    function pad(n) { return n < 10 ? '0' + n : n; }

    function trimString(s) {
      return s.replace(/^\s+|\s+$/g, '');
    }

    function addClass(el, c) {
      if (!el) return;
      if ((' ' + el.className + ' ').indexOf(' ' + c + ' ') === -1) {
        el.className = trimString(el.className + ' ' + c);
      }
    }

    function removeClass(el, c) {
      if (!el) return;
      var re = new RegExp('\\b' + c + '\\b', 'g');
      el.className = trimString(el.className.replace(re, ' ').replace(/\s+/g, ' '));
    }

    function hasClass(el, c) {
      if (!el) return false;
      return (' ' + el.className + ' ').indexOf(' ' + c + ' ') !== -1;
    }

    /* ── MODO DÍA / NOCHE ── */
    var modeOverride = 'auto';

    function applyMode(m) {
      document.body.className = m;
    }

    function checkMode() {
      if (modeOverride !== 'auto') {
        applyMode(modeOverride);
        return;
      }
      var h = new Date().getHours();
      applyMode((h >= 20 || h < 7) ? 'night' : 'day');
    }

    function forceMode(m) {
      modeOverride = m;
      var btns = document.getElementsByTagName('button');
      var i;
      for (i = 0; i < btns.length; i++) {
        removeClass(btns[i], 'active');
      }
      addClass(document.getElementById('btn-' + m), 'active');
      checkMode();
      updateRestMode();
      updateAmbientDimming();
    }

    checkMode();
    setInterval(checkMode, 30000);

    /* ── RELOJ ── */
    function updateClock() {
      var now = new Date();
      document.getElementById('time').innerHTML =
        pad(now.getHours()) + '<span class="sep">:</span>' + pad(now.getMinutes());
      document.getElementById('seconds').innerHTML = pad(now.getSeconds());
    }
    updateClock();
    setInterval(updateClock, 1000);

    /* ── FESTIVOS MÉXICO 2026-2027 ── */
    var FESTIVOS = [
      {fecha:'2026-01-01',nombre:'AÑO NUEVO'},
      {fecha:'2026-02-02',nombre:'DÍA DE LA CANDELARIA'},
      {fecha:'2026-02-05',nombre:'DÍA DE LA CONSTITUCIÓN'},
      {fecha:'2026-03-16',nombre:'NATALICIO DE BENITO JUÁREZ'},
      {fecha:'2026-04-02',nombre:'JUEVES SANTO'},
      {fecha:'2026-04-03',nombre:'VIERNES SANTO'},
      {fecha:'2026-05-01',nombre:'DÍA DEL TRABAJO'},
      {fecha:'2026-05-10',nombre:'DÍA DE LAS MADRES'},
      {fecha:'2026-09-16',nombre:'DÍA DE LA INDEPENDENCIA'},
      {fecha:'2026-11-02',nombre:'DÍA DE MUERTOS'},
      {fecha:'2026-11-16',nombre:'REVOLUCIÓN MEXICANA'},
      {fecha:'2026-12-12',nombre:'VIRGEN DE GUADALUPE'},
      {fecha:'2026-12-25',nombre:'NAVIDAD'},
      {fecha:'2027-01-01',nombre:'AÑO NUEVO'},
      {fecha:'2027-02-05',nombre:'DÍA DE LA CONSTITUCIÓN'},
      {fecha:'2027-03-21',nombre:'NATALICIO DE BENITO JUÁREZ'},
      {fecha:'2027-03-25',nombre:'JUEVES SANTO'},
      {fecha:'2027-03-26',nombre:'VIERNES SANTO'},
      {fecha:'2027-05-01',nombre:'DÍA DEL TRABAJO'},
      {fecha:'2027-05-10',nombre:'DÍA DE LAS MADRES'},
      {fecha:'2027-09-16',nombre:'DÍA DE LA INDEPENDENCIA'},
      {fecha:'2027-11-02',nombre:'DÍA DE MUERTOS'},
      {fecha:'2027-11-15',nombre:'REVOLUCIÓN MEXICANA'},
      {fecha:'2027-12-12',nombre:'VIRGEN DE GUADALUPE'},
      {fecha:'2027-12-25',nombre:'NAVIDAD'}
    ];

    function renderFestivos() {
      var now  = new Date();
      var hoy  = now.getFullYear() + '-' + pad(now.getMonth()+1) + '-' + pad(now.getDate());
      var html = '<div class="date-display">' +
        DIAS[now.getDay()] + '  ' + pad(now.getDate()) + ' ' +
        MESES[now.getMonth()] + ' ' + now.getFullYear() +
      '</div>';

      var count = 0;
      var i, f, p, fd, hoyD, diff, etiq;

      for (i = 0; i < FESTIVOS.length && count < 3; i++) {
        if (FESTIVOS[i].fecha < hoy) continue;

        f = FESTIVOS[i];
        p = f.fecha.split('-');
        fd = new Date(parseInt(p[0], 10), parseInt(p[1], 10)-1, parseInt(p[2], 10));
        hoyD = new Date(now.getFullYear(), now.getMonth(), now.getDate());
        diff = Math.round((fd - hoyD) / 86400000);

        etiq = diff === 0 ? '— HOY —' : diff === 1 ? 'MAÑANA' : 'EN ' + diff + ' DÍAS';

        html += '<div class="festivo-item">' +
          '<div class="festivo-fecha">' + DIAS[fd.getDay()] + '  ' + pad(fd.getDate()) + ' ' + MESES[fd.getMonth()] + ' ' + fd.getFullYear() + '</div>' +
          '<div class="festivo-nombre">' + f.nombre + '</div>' +
          '<div class="festivo-dias">' + etiq + '</div>' +
        '</div>';

        count++;
      }

      document.getElementById('festivos').innerHTML = html;
    }

    renderFestivos();
    setInterval(renderFestivos, 60000);

    /* ── CLIMA — XMLHttpRequest ── */
    var WMO = {
      0:'DESPEJADO',1:'CASI DESPEJADO',2:'PARCIAL. NUBLADO',3:'NUBLADO',
      45:'NEBLINA',48:'NEBLINA C/HIELO',
      51:'LLOVIZNA LIGERA',53:'LLOVIZNA',55:'LLOVIZNA INTENSA',
      61:'LLUVIA LIGERA',63:'LLUVIA',65:'LLUVIA INTENSA',
      71:'NIEVE LIGERA',73:'NIEVE',75:'NIEVE INTENSA',
      80:'CHUBASCOS',81:'CHUBASCOS FUERTES',82:'CHUBASCOS VIOLENTOS',
      95:'TORMENTA',96:'TORMENTA C/GRANIZO',99:'TORMENTA FUERTE'
    };

    function cutText(s, n) {
      if (!s) return '';
      if (s.length <= n) return s;
      return s.substring(0, n);
    }

    function loadWeather() {
      var url = 'https://api.open-meteo.com/v1/forecast' +
        '?latitude='  + LAT + '&longitude=' + LON +
        '&current=temperature_2m,apparent_temperature,weathercode,windspeed_10m,relative_humidity_2m' +
        '&daily=temperature_2m_max,temperature_2m_min,weathercode' +
        '&timezone=America%2FMexico_City&forecast_days=3';

      var xhr = new XMLHttpRequest();
      xhr.open('GET', url, true);

      xhr.onreadystatechange = function() {
        if (xhr.readyState !== 4) return;

        if (xhr.status !== 200) {
          document.getElementById('weather').innerHTML =
            '<div class="err">ERROR HTTP ' + xhr.status + '</div><div class="msg" style="margin-top:6px;">REINTENTANDO...</div>';
          setTimeout(loadWeather, 30000);
          return;
        }

        try {
          var data = JSON.parse(xhr.responseText);
          var c = data.current;
          var d = data.daily;
          var desc = WMO[c.weathercode] || ('COD:' + c.weathercode);

          var html = '<div class="temp">' + Math.round(c.temperature_2m) + '°</div>';
          html += '<div class="weather-row">';
          html += '<div class="weather-item">ST ' + Math.round(c.apparent_temperature) + '°  HUM ' + c.relative_humidity_2m + '%</div>';
          html += '<div class="weather-item">VIENTO ' + Math.round(c.windspeed_10m) + ' KM/H</div>';
          html += '<div class="weather-item">' + desc + '</div></div>';

          if (d && d.time) {
            html += '<div style="margin-top:10px;">';
            var n = d.time.length < 3 ? d.time.length : 3;
            var i, dt;

            for (i = 0; i < n; i++) {
              dt = new Date(d.time[i] + 'T12:00:00');
              html += '<div class="weather-item">' + DIAS[dt.getDay()] + ' ' +
                Math.round(d.temperature_2m_min[i]) + '/' + Math.round(d.temperature_2m_max[i]) + '°  ' +
                cutText((WMO[d.weathercode[i]] || ''), 16) + '</div>';
            }
            html += '</div>';
          }

          document.getElementById('weather').innerHTML = html;
        } catch(e) {
          document.getElementById('weather').innerHTML = '<div class="err">ERROR DE DATOS</div>';
        }
      };

      xhr.onerror = function() {
        document.getElementById('weather').innerHTML =
          '<div class="err">SIN CONEXIÓN</div><div class="msg" style="margin-top:6px;">REINTENTANDO...</div>';
        setTimeout(loadWeather, 60000);
      };

      xhr.send();
    }

    loadWeather();
    setInterval(loadWeather, 600000);

    /* ── MICRODESPLAZAMIENTO ANTI-BURN-IN ── */
    var shiftPositions = [
      {x:0,  y:0},
      {x:2,  y:1},
      {x:-2, y:1},
      {x:1,  y:-2},
      {x:-1, y:-2},
      {x:3,  y:0},
      {x:-3, y:0},
      {x:0,  y:2},
      {x:0,  y:-2},
      {x:4,  y:1},
      {x:-4, y:-1},
      {x:2,  y:-3},
      {x:-2, y:3}
    ];
    var shiftIndex = 0;

    function applyScreenShift() {
      var el = document.getElementById('screen-shift');
      var p = shiftPositions[shiftIndex];
      el.style.webkitTransform = 'translate(' + p.x + 'px,' + p.y + 'px)';
      el.style.transform = 'translate(' + p.x + 'px,' + p.y + 'px)';
      shiftIndex = (shiftIndex + 1) % shiftPositions.length;
    }

    applyScreenShift();
    setInterval(applyScreenShift, 60000);

    /* ── ROTACIÓN DE LAYOUT ── */
    var layouts = ['layout-a', 'layout-b', 'layout-c'];
    var layoutIndex = 0;

    function rotateLayout() {
      var watch = document.getElementById('watch');
      removeClass(watch, 'layout-a');
      removeClass(watch, 'layout-b');
      removeClass(watch, 'layout-c');
      addClass(watch, layouts[layoutIndex]);
      layoutIndex = (layoutIndex + 1) % layouts.length;
    }

    rotateLayout();
    setInterval(rotateLayout, 900000);

    /* ── ATENUACIÓN AUTOMÁTICA DE PANELES SECUNDARIOS ── */
    function updateAmbientDimming() {
      var watch = document.getElementById('watch');
      var s = new Date().getMinutes();

      removeClass(watch, 'dim-panels');

      if (modeOverride === 'night') {
        addClass(watch, 'dim-panels');
        return;
      }

      if (modeOverride === 'auto') {
        var h = new Date().getHours();
        if (h >= 20 || h < 7) {
          addClass(watch, 'dim-panels');
          return;
        }
      }

      /* Cada 10 minutos, durante unos minutos, deja paneles más tenues */
      if ((s % 10) >= 4) {
        addClass(watch, 'dim-panels');
      }
    }

    updateAmbientDimming();
    setInterval(updateAmbientDimming, 60000);

    /* ── MODO DESCANSO NOCTURNO ── */
    function updateRestMode() {
      var watch = document.getElementById('watch');
      var h = new Date().getHours();

      removeClass(watch, 'rest-mode');

      /* 01:00–05:59 = modo descanso */
      if (h >= 1 && h < 6) {
        addClass(watch, 'rest-mode');
      }
    }

    updateRestMode();
    setInterval(updateRestMode, 60000);

    /* ── REFRESCO LARGO DE POSICIÓN Y OPACIDAD ── */
    function longCycleRefresh() {
      var watch = document.getElementById('watch');

      watch.style.opacity = '0.92';
      setTimeout(function() {
        watch.style.opacity = '1';
      }, 1200);
    }

    setInterval(longCycleRefresh, 1800000);

    /* ── EVITA TEXTO SELECCIONABLE / GESTOS ── */
    document.ontouchstart = function(){};
    document.oncontextmenu = function() { return false; };

    /* ── SERVICE WORKER ── */
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js').catch(function() {});
    }
  </script>
</body>
</html>
